<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Crystal | Dynamic Predictor</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
        .card { background: #1e293b; padding: 1.5rem; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); width: 100%; max-width: 400px; margin-bottom: 2rem; }
        input { width: 100%; padding: 0.75rem; margin: 0.5rem 0; border-radius: 0.5rem; border: 2px solid transparent; background: #334155; color: white; }
        button { width: 100%; padding: 0.75rem; background: #10b981; border: none; border-radius: 0.5rem; color: white; font-weight: bold; cursor: pointer; }
        
        .crystal-container { margin: 4rem 0; perspective: 500px; }
        .crystal {
            width: 120px; height: 120px;
            background: #3b82f6;
            border-radius: 20px;
            transform: rotateX(20deg) rotateY(30deg);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            transition: background 0.5s ease;
        }

        @keyframes rotateClockwise { 
            from { transform: rotateX(20deg) rotateY(30deg); } 
            to { transform: rotateX(20deg) rotateY(390deg); } 
        }
        @keyframes rotateCounter { 
            from { transform: rotateX(20deg) rotateY(30deg); } 
            to { transform: rotateX(20deg) rotateY(-330deg); } 
        }
        
        .result { margin-top: 2rem; text-align: center; font-weight: bold; font-size: 1.4rem; }
        .stats { margin-top: 0.5rem; font-size: 0.9rem; color: #94a3b8; text-align: center; }
    </style>
</head>
<body>

<div class="crystal-container">
    <div id="crystal" class="crystal"></div>
</div>

<div class="card">
    <h2>Sports Crystal</h2>
    <input type="number" id="rating-home" placeholder="Home Team Elo">
    <input type="number" id="rating-away" placeholder="Away Team Elo">
    <button onclick="predict()">Consult the Crystal</button>
    <div id="result" class="result">Awaiting input...</div>
    <div id="stats" class="stats"></div>
</div>

<script>
    function predict() {
        const h = parseFloat(document.getElementById('rating-home').value);
        const a = parseFloat(document.getElementById('rating-away').value);
        const crystal = document.getElementById('crystal');
        const resDiv = document.getElementById('result');
        const statsDiv = document.getElementById('stats');
        
        if (isNaN(h) || isNaN(a)) return;

        const probHome = 1 / (1 + Math.pow(10, (a - h) / 400));
        const isHome = probHome > 0.5;
        const confidence = isHome ? probHome : (1 - probHome);
        
        // Speed logic: higher confidence = faster spin
        const duration = 2.5 - (confidence * 2); 

        crystal.style.animation = 'none';
        void crystal.offsetWidth;
        
        crystal.style.background = isHome ? '#3b82f6' : '#ef4444';
        const animName = isHome ? 'rotateClockwise' : 'rotateCounter';
        crystal.style.animation = `${animName} ${duration}s ease-out forwards`;
        
        setTimeout(() => {
            resDiv.innerHTML = isHome ? "Home Favored" : "Away Favored";
            statsDiv.innerHTML = `Win Probability: ${(confidence * 100).toFixed(1)}%`;
        }, duration * 1000);
    }
</script>
</body>
</html>
