<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Crystal | Three.js 3D Predictor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
        .card { background: #1e293b; padding: 1.5rem; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); width: 100%; max-width: 400px; margin-bottom: 2rem; }
        input { width: 100%; padding: 0.75rem; margin: 0.5rem 0; border-radius: 0.5rem; border: 2px solid transparent; background: #334155; color: white; }
        button { width: 100%; padding: 0.75rem; background: #10b981; border: none; border-radius: 0.5rem; color: white; font-weight: bold; cursor: pointer; }
        
        #crystal-container { width: 300px; height: 300px; margin: 2rem auto; }
        .result { margin-top: 2rem; text-align: center; font-weight: bold; font-size: 1.4rem; }
        .stats { margin-top: 0.5rem; font-size: 0.9rem; color: #94a3b8; text-align: center; }
    </style>
</head>
<body>

<div id="crystal-container"></div>

<div class="card">
    <h2>Sports Crystal</h2>
    <input type="number" id="rating-home" placeholder="Home Team Elo">
    <input type="number" id="rating-away" placeholder="Away Team Elo">
    <button onclick="predict()">Consult the Crystal</button>
    <div id="result" class="result">Awaiting input...</div>
    <div id="stats" class="stats"></div>
</div>

<script>
    // 1. Setup Three.js Scene
    const container = document.getElementById('crystal-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(300, 300);
    container.appendChild(renderer.domElement);

    // 2. Create Cube
    const geometry = new THREE.BoxGeometry(2, 2, 2);
    const material = new THREE.MeshPhongMaterial({ color: 0x3b82f6, shininess: 100 });
    const cube = new THREE.Mesh(geometry, material);
    scene.add(cube);

    // 3. Lighting
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(1, 1, 2);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));
    camera.position.z = 5;

    // 4. Animation Loop
    let speed = 0.02;
    let direction = 1;

    function animate() {
        requestAnimationFrame(animate);
        cube.rotation.y += speed * direction;
        renderer.render(scene, camera);
    }
    animate();

    // 5. Predict Logic
    function predict() {
        const h = parseFloat(document.getElementById('rating-home').value);
        const a = parseFloat(document.getElementById('rating-away').value);
        if (isNaN(h) || isNaN(a)) return;

        const probHome = 1 / (1 + Math.pow(10, (a - h) / 400));
        const isHome = probHome > 0.5;
        const confidence = isHome ? probHome : (1 - probHome);
        
        // Update cube properties
        cube.material.color.set(isHome ? 0x3b82f6 : 0xef4444);
        direction = isHome ? 1 : -1;
        speed = 0.01 + (confidence * 0.05); 
        
        document.getElementById('result').innerHTML = isHome ? "Home Favored" : "Away Favored";
        document.getElementById('stats').innerHTML = `Win Probability: ${(confidence * 100).toFixed(1)}%`;
    }
</script>
</body>
</html>
