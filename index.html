<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Crystal | 3D Predictor</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
        .card { background: #1e293b; padding: 1.5rem; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); width: 100%; max-width: 400px; margin-bottom: 2rem; }
        input { width: 100%; padding: 0.75rem; margin: 0.5rem 0; border-radius: 0.5rem; border: 2px solid transparent; background: #334155; color: white; }
        .home-input { border-color: #3b82f6; }
        .away-input { border-color: #ef4444; }
        button { width: 100%; padding: 0.75rem; background: #10b981; border: none; border-radius: 0.5rem; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #059669; }
        
        /* 3D Crystal Container */
        .crystal-container { perspective: 800px; margin: 4rem 0; }
        .crystal {
            width: 100px; height: 100px;
            position: relative;
            transform-style: preserve-3d;
            transition: all 0.5s ease;
            /* Tilt to reveal depth */
            transform: rotateX(-20deg) rotateY(30deg);
        }
        .face {
            position: absolute; width: 100px; height: 100px;
            border: 1px solid rgba(255,255,255,0.4);
            /* Gradient for light/shadow depth */
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(0,0,0,0.2) 100%);
            transition: background 0.5s ease;
        }
        /* Positioning cube faces */
        .front { transform: translateZ(50px); }
        .back { transform: rotateY(180deg) translateZ(50px); }
        .right { transform: rotateY(90deg) translateZ(50px); }
        .left { transform: rotateY(-90deg) translateZ(50px); }
        .top { transform: rotateX(90deg) translateZ(50px); }
        .bottom { transform: rotateX(-90deg) translateZ(50px); }

        @keyframes spinClockwise { from { transform: rotateX(-20deg) rotateY(30deg); } to { transform: rotateX(-20deg) rotateY(390deg); } }
        @keyframes spinCounter { from { transform: rotateX(-20deg) rotateY(30deg); } to { transform: rotateX(-20deg) rotateY(-330deg); } }
        @keyframes tumble { 0% { transform: rotateX(0deg) rotateY(0deg); } 50% { transform: rotateX(180deg) rotateZ(45deg); } 100% { transform: rotateX(360deg) rotateY(0deg); } }
        
        .result { margin-top: 1rem; text-align: center; font-weight: bold; font-size: 1.2rem; }
        .stats { margin-top: 0.5rem; font-size: 0.9rem; color: #94a3b8; text-align: center; }
    </style>
</head>
<body>

<div class="crystal-container">
    <div id="crystal" class="crystal">
        <div class="face front"></div><div class="face back"></div>
        <div class="face right"></div><div class="face left"></div>
        <div class="face top"></div><div class="face bottom"></div>
    </div>
</div>

<div class="card">
    <h2>Sports Crystal</h2>
    <input type="number" id="rating-home" class="home-input" placeholder="Home Team Elo">
    <input type="number" id="rating-away" class="away-input" placeholder="Away Team Elo">
    <button onclick="predict()">Consult the Crystal</button>
    <div id="result" class="result">Enter ratings to predict.</div>
    <div id="stats" class="stats"></div>
</div>

<script>
    function predict() {
        const h = parseFloat(document.getElementById('rating-home').value);
        const a = parseFloat(document.getElementById('rating-away').value);
        const crystal = document.getElementById('crystal');
        const faces = document.querySelectorAll('.face');
        const resDiv = document.getElementById('result');
        const statsDiv = document.getElementById('stats');
        
        if (isNaN(h) || isNaN(a)) return;

        const probHome = 1 / (1 + Math.pow(10, (a - h) / 400));
        const isTie = Math.abs(probHome - 0.5) < 0.05;
        
        crystal.style.animation = 'none';
        void crystal.offsetWidth;
        
        const color = isTie ? '#a855f7' : (probHome > 0.5 ? '#3b82f6' : '#ef4444');
        faces.forEach(f => f.style.background = color);
        
        if (isTie) {
            crystal.style.animation = 'tumble 2s infinite linear';
            resDiv.innerHTML = "Too Close to Call!";
        } else {
            const isHome = probHome > 0.5;
            const probability = isHome ? probHome : (1 - probHome);
            const duration = 3.5 - (probability * 3);
            crystal.style.animation = `${isHome ? 'spinClockwise' : 'spinCounter'} ${duration}s infinite linear`;
            resDiv.innerHTML = `${isHome ? "Home" : "Away"} Favored`;
        }
        statsDiv.innerHTML = `Home: ${(probHome * 100).toFixed(1)}% | Away: ${((1 - probHome) * 100).toFixed(1)}%`;
    }
</script>
</body>
</html>
